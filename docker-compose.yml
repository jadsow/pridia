services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pridia_backend
    working_dir: /app
    environment:
      DATABASE_URL: postgresql://pridia:pridia@postgres:5432/pridia
      PORT: 3000
      OLLAMA_URL: http://ollama:11434
      FRONTEND_ORIGIN: http://localhost:5173
    ports:
      - "3001:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - ollama

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pridia_frontend
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:3001
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  postgres:
    image: postgres:16
    container_name: pridia_postgres
    restart: always
    environment:
      POSTGRES_USER: pridia
      POSTGRES_PASSWORD: pridia
      POSTGRES_DB: pridia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/infra/db/init.sql:/docker-entrypoint-initdb.d/init.sql

  ollama:
    image: ollama/ollama
    container_name: pridia_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama serve &
       sleep 5 &&
       ollama pull llama3 &&
       wait"

volumes:
  postgres_data:
  ollama_data: